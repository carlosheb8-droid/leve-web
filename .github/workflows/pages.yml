name: Publicar web
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Expandir build na raiz
        run: |
          unzip -o leve-web.zip -d /tmp/site
          rsync -a /tmp/site/ ./
          rm -f leve-web.zip
          git config user.name "leve-setup"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Publicar build web"
          git push
